<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | GitHub Issue Tracker</title>
    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- Google Fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="./css/style.css">
    <!-- Favicon -->
    <link rel="icon" href="./assets/github-logo.png" type="image/png">

</head>
<body>
<header>
    <div class="header-inner">
        <div class="header-left">
            <img src="./assets/github-logo.png" alt="" height="36px" width="auto">
            <h1>GitHub Issues Tracker</h1>
        </div>
        <div class="header-right">
            <div class="search-issue">
                <input id="search-issues" type="search" placeholder="Search issues...">
                <button class="btn-search active"><i class="fa-brands fa-sistrix"></i></button>
            </div>
            <button class="btn active"><i class="fa-solid fa-plus"></i> New Issue</button>
            <a href="./index.html" class="btn active"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
        </div>
    </div>
</header>
<section class="container">
    <div class="nav-wrapper">
        <button onclick="loadAllIssues(this)" class="btn active">All</button>
        <button onclick="loadOpenIssues(this)" class="btn">Open</button>
        <button onclick="loadClosedIssues(this)" class="btn">Closed</button>
    </div>
</section>
<section class="container">
    <div class="section-issue-list">
        <div class="top-wrapper">
            <div class="top-left">
                <img src="./assets/Aperture.png" alt="">
                <div class="text-outer">
                    <h2><span id="issues-count">50</span> Issues</h2>
                    <p>Track and manage your project issues</p>
                </div>
            </div>
            <div class="top-right">
                <span class="open-indicator"></span>
                <span>Open</span>
                <span class="close-indicator"></span>
                <span>Close</span>
            </div>
        </div> 
        <div class="issues-wrapper">
            <div id="issues-loader" class="hidden">
                <div class="issues-loader">
                    <div class="loader"></div>
                </div>
            </div>
            <div id="data-load-container" class="grid-wrapper">
            </div>
        </div>
    </div>
</section>
<div id="open_modal" class="modal hidden">
    <div id="modal-loader" class="hidden">
        <div class="issues-loader">
            <div class="loader"></div>
        </div>
    </div>
    <div id="modal-details">
    </div>
    <div class="close-modal">
        <button onclick="closeModal()" class="btn active">Close</button>
    </div>
</div>
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()"></div>
<script src="./script/main.js"></script>
</body>
</html>
