<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GitHub Issue Tracker</title>
    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- Google Fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="./css/style.css">

</head>
<body>
<header>
    <div class="header-inner">
        <div class="header-left">
            <img src="./assets/github-logo.png" alt="" height="36px" width="auto">
            <h1>GitHub Issues Tracker</h1>
        </div>
        <div class="header-right">
            <div class="search-issue">
                <input id="search-issues" type="search" placeholder="Search issues...">
                <button class="btn-search active"><i class="fa-brands fa-sistrix"></i></button>
            </div>
            <button class="btn active"><i class="fa-solid fa-plus"></i> New Issue</button>
            <a href="./index.html" class="btn active"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
        </div>
    </div>
</header>
<section class="container">
    <div class="nav-wrapper">
        <button class="btn active">All</button>
        <button class="btn">Open</button>
        <button class="btn">Closed</button>
    </div>
</section>
<section class="container">
    <div class="section-issue-list">
        <div class="top-wrapper">
            <div class="top-left">
                <img src="./assets/Aperture.png" alt="">
                <div class="text-outer">
                    <h2><span id="issues-count">50</span> Issues</h2>
                    <p>Track and manage your project issues</p>
                </div>
            </div>
            <div class="top-right">
                <span class="open-indicator"></span>
                <span>Open</span>
                <span class="close-indicator"></span>
                <span>Close</span>
            </div>
        </div>
        <div class="issues-wrapper">
            <div class="grid-wrapper">
                <div class="card status-open">
                    <div class="inner-card">
                        <div class="card-head">
                            <img src="./assets/Open-Status.png" alt="" class="status-open-icon">
                        </div>
                        <div class="issue-details">
                            <h3>Fix navigation menu on mobile devices</h3>
                            <p>The navigation menu doesn't collapse properly on mobile devices...</p>
                        </div>
                        <div class="labels">
                            <span class="bugs"><i class="fa-solid fa-bug"></i> Bugs</span>
                            <span class="help"><i class="fa-regular fa-life-ring"></i> Help Wanted</span>
                            <span class="help"><i class="fa-solid fa-arrow-up-right-dots"></i> Enhancement</span>
                        </div>
                        <div class="card-bottom">
                            <div class="declare-by">
                                <p>#1 by john_doe</p>
                                <p><strong>Assignee:</strong> alex_perf</p>
                            </div>
                            <div class="date">
                                <p>2024-01-23</p>
                                <p><Strong>Updated</Strong>2024-01-23</p>
                            </div>
                        </div>
                    </div>

                </div>
                <div class="card status-close"></div>
            </div>
        </div>
    </div>
</section>
<script src="./script/main.js"></script>
</body>
</html>
